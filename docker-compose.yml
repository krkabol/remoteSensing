services:
    php:
        build:
            context: ./docker/php
            dockerfile: Dockerfile
        container_name: symfony_php
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:cached
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        depends_on:
            - database
        environment:
            - DATABASE_URL=postgresql://symfony:symfony@database:5432/symfony?serverVersion=16&charset=utf8

    nginx:
        image: nginx:alpine
        container_name: symfony_nginx
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www/html:cached
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    database:
        image: postgres:16-alpine
        container_name: symfony_database
        environment:
            POSTGRES_DB: symfony
            POSTGRES_USER: symfony
            POSTGRES_PASSWORD: symfony
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data

    pgadmin:
        image: dpage/pgadmin4
        container_name: pgadmin4
        ports:
            - 9005:80
        volumes:
            - ${PWD}/pgadmin4:/var/lib/pgadmin
        links:
            - database
        environment:
            - PGADMIN_DEFAULT_EMAIL=krkabol@gmail.com
            - PGADMIN_DEFAULT_PASSWORD=krkabol
volumes:
    postgres_data:
