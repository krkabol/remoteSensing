framework:
    secret: '%env(APP_SECRET)%'
    csrf_protection: true
    handle_all_throwables: true
    php_errors:
        log: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    router:
        utf8: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
