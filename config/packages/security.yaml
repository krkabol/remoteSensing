security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: githubId

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Main firewall - handles all routes with OAuth
        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider
            custom_authenticators:
                - App\Security\GithubAuthenticator
            logout:
                path: app_logout
                target: /

    access_control:
        # Public routes are accessible to everyone
        - { path: ^/public, roles: PUBLIC_ACCESS }
        # Internal routes require authenticated user
        - { path: ^/internal, roles: ROLE_USER }
        # GitHub OAuth callback
        - { path: ^/auth/github/callback, roles: PUBLIC_ACCESS }